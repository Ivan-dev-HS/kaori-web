<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaori – Tienda</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #faf8f5; color: #2d1b69; }
    h1,h2,h3,h4 { font-family: 'Cormorant Garamond', serif; }
    a { text-decoration: none; color: inherit; }

    /* ── NAVBAR ── */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 72px; background: rgba(250,248,245,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid #f3e8ff; transition: all 0.3s; }
    .nav-logo  { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; letter-spacing: 0.2em; color: #4c1d95; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { font-size: 0.85rem; color: #4b5563; transition: color 0.2s; font-weight: 500; }
    .nav-links a:hover { color: #7c3aed; }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .nav-cuenta { background: white; color: #7c3aed; border: 1px solid #e9d5ff; border-radius: 9999px; padding: 0.5rem 1.2rem; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
    .nav-cuenta:hover { background: #f3e8ff; }
    .nav-cart-wrap { position: relative; }
    .nav-cart-btn { background: #7c3aed; color: white; border: none; border-radius: 9999px; padding: 0.5rem 1.2rem; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 600; transition: background 0.2s; display: flex; align-items: center; gap: 0.4rem; }
    .nav-cart-btn:hover { background: #6d28d9; }
    .cart-count-badge { position: absolute; top: -6px; right: -6px; background: #ec4899; color: white; font-size: 0.65rem; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; }

    /* ── HAMBURGER ── */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; flex-direction: column; gap: 5px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: #4c1d95; border-radius: 2px; }
    .mobile-menu { display: none; position: fixed; top: 72px; left: 0; right: 0; background: white; border-bottom: 1px solid #f3e8ff; padding: 1rem 2rem; z-index: 49; flex-direction: column; gap: 0.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .mobile-menu a { font-size: 0.95rem; color: #4c1d95; font-weight: 600; padding: 0.6rem 0; border-bottom: 1px solid #faf5ff; display: block; }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu.open { display: flex; }

    /* ── HEADER ── */
    .shop-header { padding: 6rem 1.5rem 3rem; background: linear-gradient(to bottom, #faf5ff, white); text-align: center; }
    .shop-label { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: #a855f7; margin-bottom: 0.5rem; }
    .shop-header h1 { font-size: clamp(2rem, 5vw, 4rem); color: #4c1d95; margin-bottom: 0.8rem; font-weight: 300; }
    .shop-header p  { color: #6b7280; font-size: 0.95rem; }

    /* ── BODY ── */
    .shop-body { max-width: 80rem; margin: 0 auto; padding: 2rem 1.5rem 4rem; display: flex; gap: 2rem; }

    /* ── SIDEBAR ── */
    .sidebar { width: 220px; flex-shrink: 0; }
    .sidebar-card { background: white; border-radius: 1rem; padding: 1.25rem; border: 1px solid #f3e8ff; margin-bottom: 1rem; }
    .sidebar h4 { font-family: 'Nunito', sans-serif; font-weight: 700; color: #4c1d95; font-size: 0.82rem; margin-bottom: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .filter-btn { display: block; width: 100%; text-align: left; padding: 0.45rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; cursor: pointer; border: none; background: transparent; color: #4b5563; font-family: 'Nunito', sans-serif; transition: all 0.15s; margin-bottom: 0.2rem; }
    .filter-btn.active { background: #ede9fe; color: #6d28d9; font-weight: 700; }
    .filter-btn:hover:not(.active) { background: #f5f3ff; color: #4c1d95; }

    /* ── MAIN ── */
    .main-area { flex: 1; min-width: 0; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap input { padding: 0.6rem 0.75rem 0.6rem 2.4rem; border: 1px solid #e9d5ff; border-radius: 9999px; font-family: 'Nunito', sans-serif; outline: none; font-size: 0.875rem; width: 100%; transition: border-color 0.2s; background: white; }
    .search-wrap input:focus { border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168,85,247,0.08); }
    .search-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; }
    select.sort { border: 1px solid #e9d5ff; border-radius: 9999px; padding: 0.6rem 1rem; font-family: 'Nunito', sans-serif; font-size: 0.875rem; outline: none; color: #4c1d95; background: white; cursor: pointer; }
    .results-count { font-size: 0.82rem; color: #9ca3af; margin-bottom: 1rem; }

    /* ── SKELETON LOADING ── */
    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
    .skeleton-card { background: white; border-radius: 1rem; overflow: hidden; border: 1px solid #f3e8ff; }
    .skeleton-img  { aspect-ratio: 1; background: linear-gradient(90deg, #f3e8ff 25%, #faf5ff 50%, #f3e8ff 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .skeleton-body { padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .skeleton-line { height: 12px; background: linear-gradient(90deg, #f3e8ff 25%, #faf5ff 50%, #f3e8ff 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 9999px; }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.btn   { height: 32px; border-radius: 9999px; margin-top: 0.5rem; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── GRID PRODUCTOS ── */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
    .product-card { background: white; border-radius: 1rem; overflow: hidden; border: 1px solid #f3e8ff; transition: all 0.3s; }
    .product-card:hover { box-shadow: 0 12px 40px rgba(124,58,237,0.15); transform: translateY(-4px); }
    .prod-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: #faf5ff; cursor: pointer; }
    .prod-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
    .product-card:hover .prod-img-wrap img { transform: scale(1.06); }
    .prod-badge { position: absolute; top: 8px; left: 8px; font-size: 0.7rem; font-weight: 700; padding: 3px 9px; border-radius: 9999px; }
    .badge-discount { background: #ec4899; color: white; }
    .badge-featured { background: #7c3aed; color: white; }
    .product-info { padding: 1rem; }
    .product-cat   { font-size: 0.68rem; color: #a855f7; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
    .product-info h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: #4c1d95; margin: 0.3rem 0; line-height: 1.3; }
    .price-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .product-price   { color: #7c3aed; font-weight: 700; font-size: 0.95rem; }
    .product-compare { color: #9ca3af; text-decoration: line-through; font-size: 0.82rem; }
    .add-cart-btn { width: 100%; background: #f3e8ff; color: #7c3aed; border: none; border-radius: 9999px; padding: 0.6rem; font-family: 'Nunito', sans-serif; font-weight: 600; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
    .add-cart-btn:hover { background: #7c3aed; color: white; }
    .add-cart-btn.added { background: #dcfce7; color: #16a34a; }

    /* ── ERROR / VACÍO ── */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 3rem; color: #9ca3af; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: #4c1d95; color: white; padding: 0.85rem 1.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 600; z-index: 200; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; white-space: nowrap; font-family: 'Nunito', sans-serif; box-shadow: 0 8px 24px rgba(76,29,149,0.3); }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── FOOTER ── */
    footer { background: #1e0a3c; color: white; padding: 2rem 1.5rem; }
    .footer-bottom { max-width: 72rem; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; color: #7c5cbf; font-size: 0.8rem; }
    .footer-bottom a { color: #a78bfa; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) { .sidebar { width: 180px; } }
    @media (max-width: 768px) {
      nav { padding: 0 1rem; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .sidebar { display: none; }
      .shop-body { padding-top: 1rem; }
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
    }
    @media (max-width: 480px) {
      .shop-header { padding: 5rem 1rem 2rem; }
      .shop-body { padding: 1rem; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
      .product-info { padding: 0.75rem; }
      .toolbar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">KAORI</a>
    <div class="nav-links">
      <a href="shop.html">Tienda</a>
      <a href="about.html">Nosotras</a>
      <a href="contact.html">Contacto</a>
    </div>
    <div class="nav-right">
      <a href="login.html" class="nav-cuenta" id="btnCuenta">👤 Mi cuenta</a>
      <div class="nav-cart-wrap">
        <button class="nav-cart-btn" onclick="CartWidget.toggle()">
          🛒 <span class="cart-count-text">0</span>
        </button>
        <span class="cart-count-badge">0</span>
      </div>
      <button class="hamburger" onclick="toggleMenu()" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html"   onclick="toggleMenu()">Inicio</a>
    <a href="shop.html"    onclick="toggleMenu()">Tienda</a>
    <a href="about.html"   onclick="toggleMenu()">Nosotras</a>
    <a href="contact.html" onclick="toggleMenu()">Contacto</a>
    <a href="login.html"   onclick="toggleMenu()" id="mobileLoginBtn">Mi cuenta</a>
  </div>

  <div class="shop-header">
    <p class="shop-label" data-animate="fade-up">Nuestra Tienda</p>
    <h1 data-animate="fade-up" data-delay="100">Tienda</h1>
    <p data-animate="fade-up" data-delay="200">Descubre nuestra selección de productos artesanales creados con amor</p>
  </div>

  <div class="shop-body">
    <aside class="sidebar">
      <div class="sidebar-card">
        <h4>Categorías</h4>
        <button class="filter-btn active" onclick="setCategoria('', this)">Todas</button>
        <button class="filter-btn" onclick="setCategoria('velas', this)">🕯️ Velas</button>
        <button class="filter-btn" onclick="setCategoria('minerales', this)">💎 Minerales</button>
        <button class="filter-btn" onclick="setCategoria('joyeria', this)">📿 Joyería</button>
        <button class="filter-btn" onclick="setCategoria('ambientacion', this)">🌸 Ambientación</button>
        <button class="filter-btn" onclick="setCategoria('corporal', this)">🧴 Corporal</button>
        <button class="filter-btn" onclick="setCategoria('quemadores', this)">🔥 Quemadores</button>
      </div>
      <div class="sidebar-card">
        <h4>Precio</h4>
        <button class="filter-btn active" onclick="setPrecio(null, null, this)">Todos</button>
        <button class="filter-btn" onclick="setPrecio(0, 15, this)">Hasta 15€</button>
        <button class="filter-btn" onclick="setPrecio(15, 30, this)">15€ – 30€</button>
        <button class="filter-btn" onclick="setPrecio(30, 50, this)">30€ – 50€</button>
        <button class="filter-btn" onclick="setPrecio(50, null, this)">Más de 50€</button>
      </div>
    </aside>

    <div class="main-area">
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Buscar productos..." id="searchInput" oninput="filtrarProductos()" />
        </div>
        <select class="sort" id="sortSelect" onchange="filtrarProductos()">
          <option value="newest">Más recientes</option>
          <option value="price-asc">Precio: menor a mayor</option>
          <option value="price-desc">Precio: mayor a menor</option>
          <option value="name">Nombre A–Z</option>
        </select>
      </div>
      <p class="results-count" id="resultsCount"></p>
      <div id="productsGrid"></div>
    </div>
  </div>

  <footer>
    <div class="footer-bottom">
      <p>© 2024 Kaori. Todos los derechos reservados.</p>
      <a href="index.html">← Volver al inicio</a>
    </div>
  </footer>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="cart.js"></script>
  <script src="animations.js"></script>
  <script>
    // ─── ESTADO ───────────────────────────────────────────────────────────────
    let todosLosProductos = [];
    let categoriaActiva   = '';
    let precioMin         = null;
    let precioMax         = null;

    // ─── SKELETON LOADING ─────────────────────────────────────────────────────
    function mostrarSkeleton() {
      const grid = document.getElementById('productsGrid');
      grid.className = 'skeleton-grid';
      grid.innerHTML = Array(8).fill(`
        <div class="skeleton-card">
          <div class="skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line btn"></div>
          </div>
        </div>`).join('');
    }

    // ─── CARGAR PRODUCTOS DESDE SUPABASE ──────────────────────────────────────
    async function cargarProductos() {
      mostrarSkeleton();
      try {
        const { data, error } = await db
          .from('productos')
          .select('*')
          .eq('active', true)
          .order('created_at', { ascending: false });

        if (error) throw error;

        todosLosProductos = data || [];
        filtrarProductos();

      } catch(e) {
        console.error('Error cargando productos:', e);
        const grid = document.getElementById('productsGrid');
        grid.className = 'products-grid';
        grid.innerHTML = `
          <div class="empty-state">
            <p class="icon">⚠️</p>
            <p>Error cargando productos.</p>
            <button onclick="cargarProductos()" style="margin-top:1rem;background:#7c3aed;color:white;border:none;border-radius:9999px;padding:0.6rem 1.5rem;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer">
              Reintentar
            </button>
          </div>`;
      }
    }

    // ─── FILTROS ──────────────────────────────────────────────────────────────
    function setCategoria(cat, btn) {
      categoriaActiva = cat;
      document.querySelectorAll('.sidebar-card:first-child .filter-btn')
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filtrarProductos();
    }

    function setPrecio(min, max, btn) {
      precioMin = min; precioMax = max;
      document.querySelectorAll('.sidebar-card:last-child .filter-btn')
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filtrarProductos();
    }

    // ─── FILTRAR Y RENDERIZAR ─────────────────────────────────────────────────
    function filtrarProductos() {
      const q    = document.getElementById('searchInput').value.toLowerCase();
      const sort = document.getElementById('sortSelect').value;

      let lista = todosLosProductos.filter(p => {
        const matchQ = !q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
        const matchC = !categoriaActiva || p.category === categoriaActiva;
        const matchP = (precioMin === null || p.price >= precioMin)
                    && (precioMax === null || p.price <= precioMax);
        return matchQ && matchC && matchP;
      });

      if (sort === 'price-asc')  lista.sort((a,b) => a.price - b.price);
      if (sort === 'price-desc') lista.sort((a,b) => b.price - a.price);
      if (sort === 'name')       lista.sort((a,b) => a.name.localeCompare(b.name));

      document.getElementById('resultsCount').textContent =
        `${lista.length} producto${lista.length !== 1 ? 's' : ''} encontrado${lista.length !== 1 ? 's' : ''}`;

      renderProductos(lista);
    }

    // ─── RENDER PRODUCTOS ─────────────────────────────────────────────────────
    function renderProductos(lista) {
      const grid = document.getElementById('productsGrid');
      grid.className = 'products-grid';

      if (!lista.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <p class="icon">🔍</p>
            <p>No se encontraron productos.</p>
          </div>`;
        return;
      }

      grid.innerHTML = lista.map((p, i) => {
        const disc = p.compare_price && p.compare_price > p.price
          ? Math.round((1 - p.price / p.compare_price) * 100) : 0;
        return `
          <div class="product-card" data-animate="fade-up" data-delay="${Math.min(i * 60, 400)}">
            <div class="prod-img-wrap"
                 onclick="window.location.href='product.html?id=${p.id}'">
              <img src="${p.image}" alt="${p.name}" loading="lazy"
                   onerror="this.src='https://images.unsplash.com/photo-1602178478026-72d94a3e8e3f?w=400&q=80'" />
              ${disc       ? `<span class="prod-badge badge-discount">-${disc}%</span>` : ''}
              ${p.featured ? `<span class="prod-badge badge-featured" style="top:${disc?'32px':'8px'}">✨</span>` : ''}
            </div>
            <div class="product-info">
              <p class="product-cat">${p.category}</p>
              <h4>${p.name}</h4>
              <div class="price-row">
                <span class="product-price">${Number(p.price).toFixed(2)} €</span>
                ${p.compare_price ? `<span class="product-compare">${Number(p.compare_price).toFixed(2)} €</span>` : ''}
              </div>
              <button class="add-cart-btn" onclick="añadirAlCarrito('${p.id}', this)">
                Añadir al carrito
              </button>
            </div>
          </div>`;
      }).join('');

      if (window.AnimationsInit) AnimationsInit();
    }

    // ─── CARRITO ──────────────────────────────────────────────────────────────
    function getCarrito() {
      try { return JSON.parse(localStorage.getItem('kaori_cart') || '[]'); } catch { return []; }
    }
    function guardarCarrito(cart) {
      localStorage.setItem('kaori_cart', JSON.stringify(cart));
      if (window.CartWidget) CartWidget.updateBadge();
    }

    function añadirAlCarrito(id, btn) {
      const producto = todosLosProductos.find(p => p.id === id);
      if (!producto) return;
      const cart     = getCarrito();
      const existing = cart.find(i => i.id === id);
      if (existing) existing.quantity++;
      else cart.push({
        id:       producto.id,
        name:     producto.name,
        price:    Number(producto.price),
        image:    producto.image,
        quantity: 1,
      });
      guardarCarrito(cart);
      if (window.CartWidget) CartWidget.render();
      const orig = btn.textContent;
      btn.textContent = '✓ Añadido';
      btn.classList.add('added');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('added'); }, 1500);
      mostrarToast(`"${producto.name}" añadido`);
    }

    function mostrarToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = '✓ ' + msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ─── MENÚ HAMBURGUESA ─────────────────────────────────────────────────────
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }
    document.addEventListener('click', e => {
      const menu = document.getElementById('mobileMenu');
      const ham  = document.querySelector('.hamburger');
      if (menu && ham && menu.classList.contains('open') &&
          !menu.contains(e.target) && !ham.contains(e.target)) {
        menu.classList.remove('open');
      }
    });

    // ─── NAVBAR DINÁMICO ──────────────────────────────────────────────────────
    (async () => {
      try {
        const sesion = await obtenerSesion();
        const btn    = document.getElementById('btnCuenta');
        const mBtn   = document.getElementById('mobileLoginBtn');
        if (sesion) {
          const rol = await obtenerRol();
          const href = rol === 'admin' ? 'admin.html' : 'mi-cuenta.html';
          const txt  = rol === 'admin' ? '👑 Panel Admin' : '👤 Mi cuenta';
          btn.href  = href; btn.textContent  = txt;
          mBtn.href = href; mBtn.textContent = txt;
        }
      } catch(e) {}
    })();

    // ─── INIT ─────────────────────────────────────────────────────────────────
    cargarProductos();

    // Leer categoría de URL si viene filtrada
    const urlParams = new URLSearchParams(window.location.search);
    const catParam  = urlParams.get('category');
    if (catParam) {
      const btn = Array.from(document.querySelectorAll('.filter-btn'))
        .find(b => b.textContent.toLowerCase().includes(catParam));
      if (btn) setCategoria(catParam, btn);
    }
  </script>
</body>
</html>
